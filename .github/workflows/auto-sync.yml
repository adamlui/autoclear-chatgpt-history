name: Sync (/ to adamlui/chatgpt-apps/autoclear-chatgpt-history/) && (/greasemonkey/ to adamlui/userscripts/chatgpt/autoclear-chatgpt-history/)

on:
  push:
    branches: auto-sync-sandbox
    paths: "**"

jobs:
  build:
    if: (github.repository == 'adamlui/autoclear-chatgpt-history') && (github.event.commits[0].committer.username != 'kudo-sync-bot')
    runs-on: ubuntu-latest
    steps:

      - name: Checkout adamlui/autoclear-chatgpt-history
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}
          repository: adamlui/autoclear-chatgpt-history
          path: adamlui/autoclear-chatgpt-history
          fetch-depth: 2

      - name: Sync docs between root & /greasemonkey
        id: sync_docs
        run: |
          shopt -s globstar
          cd ${{ github.workspace }}/adamlui/autoclear-chatgpt-history

          # Sync LICENSE.md
          root_license_content=$(git show HEAD:"LICENSE.md")
          root_license_modified=$(git log -1 --format="%ct" -- "LICENSE.md")
          gm_license_content=$(git show HEAD:"greasemonkey/LICENSE.md")
          gm_license_modified=$(git log -1 --format="%ct" -- "greasemonkey/LICENSE.md")
          if (( root_license_modified > gm_license_modified )) ; then
            if [[ "$root_license_content" != "$gm_license_content" ]] ; then
              cp -f "LICENSE.md" "greasemonkey/LICENSE.md" ; sync_src="root" ; echo "root license copied to gm" ; fi
          elif (( gm_license_modified > root_license_modified )) ; then
            if [[ "$gm_license_content" != "$root_license_content" ]] ; then
              cp -f "greasemonkey/LICENSE.md" "LICENSE.md" ; sync_src="greasemonkey" ; echo "gm license copied to root" ; fi ; fi

          # Sync other docs
          for file in docs/**/*.md ; do
            relative_path=${file#"docs/"}

            for prefix in {"root","gm"} ; do
              echo prefix
              eval "${prefix}_doc=\"docs/\$relative_path\""
              eval "${prefix}_doc_content=\$(git show HEAD:\"$prefix_doc\")"
              eval "${prefix}_doc_modified=\$(git log -1 --format=\"%ct\" -- \"$prefix_doc\")"
            done
            
            # root_doc="docs/$relative_path"
            # root_doc_content=$(git show HEAD:"$root_doc")
            # root_doc_modified=$(git log -1 --format="%ct" -- "$root_doc")
            # gm_doc="greasemonkey/docs/$relative_path"
            # gm_doc_content=$(git show HEAD:"$gm_doc")
            # gm_doc_modified=$(git log -1 --format="%ct" -- "$gm_doc")
            
            if (( root_doc_modified > gm_doc_modified )) ; then
              if [[ "$root_doc_content" != "$gm_doc_content" ]] ; then
                cp -f "$root_doc" "$gm_doc" ; sync_src="root" ; echo "root doc copied to gm" ; fi
            elif (( gm_doc_modified > root_doc_modified )) ; then
              if [[ "$gm_doc_content" != "$root_doc_content" ]] ; then
                cp -f "$gm_doc" "$root_doc" ; sync_src="greasemonkey" ; echo "gm doc copied to root" ; fi ; fi
          done
          
          # Store sync src for commit msg in self-push step
          echo "sync_src=$sync_src" >> $GITHUB_OUTPUT

      - name: Push to adamlui/autoclear-chatgpt-history
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          push_options: --force
          add_options: --all
          commit_user_email: auto-sync@kudoai.com
          commit_message: "${{ github.event.head_commit.message }} ↞ [auto-sync from `${{ steps.sync_docs.outputs.sync_src }}`]"
          file_pattern: "**"
          repository: adamlui/autoclear-chatgpt-history
